services:
  editor:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - BUILD_CONTEXT=editor
    ports:
      - "5173:80"
    depends_on:
      - interpreter

  interpreter:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - BUILD_CONTEXT=interpreter
    ports:
      - "5000:80"
    environment:
      - NODE_ENV=production
